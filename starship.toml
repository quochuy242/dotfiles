format = """
$os\
$username\
$hostname\
$directory\
$python\
$git_branch$git_commit$git_state$git_status\
$cmd_duration\
$line_break\
$character"""

command_timeout = 360000

[time]
format = '[$time]($style) '
style = 'bold white'
disabled = true

[aws]
symbol = "  "

[buf]
symbol = " "

[c]
symbol = " "

[conda]
symbol = " "

[crystal]
symbol = " "

[dart]
symbol = " "

[directory]
read_only = " 󰌾"
truncation_length = 8
truncation_symbol = '.../'

[docker_context]
symbol = " "

[elixir]
symbol = " "

[elm]
symbol = " "

[fennel]
symbol = " "

[fossil_branch]
symbol = " "

[git_branch]
symbol = " "
format = "| [$symbol$branch]($style) "

[git_commit]
tag_symbol = ' '
format = '[\($hash$tag\)]($style) '

[git_status]
format = "[(\\[$conflicted$staged$modified$deleted$renamed$untracked$stashed$ahead_behind\\])]($white)"

ahead    = "↑${count}"
diverged = "↑${ahead_count}↓${behind_count}"
behind   = "↓${count}"

conflicted = "[✖ $count ](bold red)"
staged     = "[✚ $count](green)"
modified   = "[✚ $count](bold blue)"
deleted    = "[- $count](red)"
renamed    = "[» $count](green)"
untracked  = "[?? $count](cyan)"
stashed    = "[⚑ $count](bold blue)"

[golang]
symbol = " "

[guix_shell]
symbol = " "

[haskell]
symbol = " "

[haxe]
symbol = " "

[hg_branch]
symbol = " "

[hostname]
ssh_symbol = " "
ssh_only = true
format = "[$hostname]($style) " 
style = "blue"

[java]
symbol = " "

[julia]
symbol = " "

